services:
  postgres:
    image: postgres:18
    container_name: autojob-postgres
    environment:
      POSTGRES_DB: autojob
      POSTGRES_USER: autojob
      POSTGRES_PASSWORD: autojob
    ports:
      - "5433:5432"
    volumes:
      - autojob_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autojob -d autojob"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  autojob_postgres_data:
