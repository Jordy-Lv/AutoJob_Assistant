services:
  - type: web
    name: autojob-assistant
    runtime: python
    buildCommand: pip install -r requirements.txt && cd frontend && npm ci && npm run build
    startCommand: python -m uvicorn autojob.api:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: SERPAPI_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: SCHEDULER_ENABLED
        value: "false"
      - key: NODE_VERSION
        value: "20"
